workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - name: Install deps
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --platform android
      - name: Build APK
        script: cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
